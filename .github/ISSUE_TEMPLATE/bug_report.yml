name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the details below.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run `terraform plan ...`
        2. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include error messages or logs if applicable.
    validations:
      required: true

  - type: input
    id: terraform-version
    attributes:
      label: Terraform version
      placeholder: e.g. 1.7.0

  - type: input
    id: aws-region
    attributes:
      label: AWS Region
      placeholder: e.g. ap-south-2

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, screenshots, or log output.
